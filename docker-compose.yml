services:
  traefik:
    image: traefik:v3.2
    container_name: tradecopilot-traefik
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./infra/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    networks:
      - tradecopilot
    depends_on:
      - api
      - client
      - keycloak

  client:
    build:
      context: .
      dockerfile: src/TradeCopilot.Client/Dockerfile
      args:
        VITE_AUTH_AUTHORITY: ${VITE_AUTH_AUTHORITY:-http://localhost/auth/realms/tradecopilot}
        VITE_AUTH_CLIENT_ID: ${VITE_AUTH_CLIENT_ID:-tradecopilot-client}
        VITE_AUTH_SCOPE: ${VITE_AUTH_SCOPE:-openid profile email}
    container_name: tradecopilot-client
    networks:
      - tradecopilot
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health | grep ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/TradeCopilot.Api/Dockerfile
    container_name: tradecopilot-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__TradeCopilot: Host=postgres;Port=5432;Database=tradecopilot;Username=tradecopilot;Password=tradecopilot_dev_password
      Authentication__Authority: ${AUTH_AUTHORITY:-http://localhost/auth/realms/tradecopilot}
      Authentication__MetadataAddress: ${AUTH_METADATA_ADDRESS:-http://keycloak:8080/auth/realms/tradecopilot/.well-known/openid-configuration}
      Authentication__BackchannelAuthority: ${AUTH_BACKCHANNEL_AUTHORITY:-http://keycloak:8080/auth/realms/tradecopilot}
      Authentication__Audience: ${AUTH_AUDIENCE:-tradecopilot-api}
      Authentication__RequireHttpsMetadata: ${AUTH_REQUIRE_HTTPS_METADATA:-false}
    networks:
      - tradecopilot
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: tradecopilot-keycloak
    command:
      - start-dev
      - --http-port=8080
      - --http-relative-path=/auth
      - --hostname=${KEYCLOAK_HOSTNAME:-http://localhost/auth}
      - --hostname-strict=false
      - --proxy-headers=xforwarded
      - --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD:-change-me-local}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak_dev_password}
    volumes:
      - ./infra/keycloak/tradecopilot-realm.json:/opt/keycloak/data/import/tradecopilot-realm.json:ro
      - ./infra/keycloak/themes:/opt/keycloak/themes:ro
    networks:
      - tradecopilot
    depends_on:
      keycloak-postgres:
        condition: service_healthy

  keycloak-postgres:
    image: postgres:16-alpine
    container_name: tradecopilot-keycloak-postgres
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak_dev_password}
    volumes:
      - tradecopilot-keycloak-postgres:/var/lib/postgresql/data
    networks:
      - tradecopilot
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: tradecopilot-postgres
    environment:
      POSTGRES_DB: tradecopilot
      POSTGRES_USER: tradecopilot
      POSTGRES_PASSWORD: tradecopilot_dev_password
    ports:
      - "5432:5432"
    volumes:
      - tradecopilot-postgres:/var/lib/postgresql/data
    networks:
      - tradecopilot
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradecopilot -d tradecopilot"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:9.15
    container_name: tradecopilot-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: dev@example.com
      PGADMIN_DEFAULT_PASSWORD: tradecopilot_dev_password
      PGADMIN_DISABLE_POSTFIX: "True"
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_REPLACE_SERVERS_ON_STARTUP: "True"
    ports:
      - "5050:80"
    configs:
      - source: pgadmin-servers
        target: /pgadmin4/servers.json
        mode: 0444
      - source: pgadmin-pgpass
        target: /config/pgpass
        uid: "5050"
        gid: "5050"
        mode: 0400
    volumes:
      - tradecopilot-pgadmin:/var/lib/pgadmin
    networks:
      - tradecopilot
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  tradecopilot-postgres:
  tradecopilot-pgadmin:
  tradecopilot-keycloak-postgres:

networks:
  tradecopilot:
    name: tradecopilot

configs:
  pgadmin-servers:
    content: |
      {
        "Servers": {
          "1": {
            "Name": "TradeCopilot PostgreSQL",
            "Group": "TradeCopilot",
            "Host": "postgres",
            "Port": 5432,
            "MaintenanceDB": "tradecopilot",
            "Username": "tradecopilot",
            "PassFile": "/config/pgpass"
          }
        }
      }
  pgadmin-pgpass:
    content: |
      postgres:5432:*:tradecopilot:tradecopilot_dev_password
