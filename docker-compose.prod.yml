name: tradecopilot-prod

services:
  client:
    build:
      context: .
      dockerfile: src/TradeCopilot.Client/Dockerfile
      args:
        VITE_APP_BASE_PATH: ${VITE_APP_BASE_PATH}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_AUTH_AUTHORITY: ${VITE_AUTH_AUTHORITY}
        VITE_AUTH_CLIENT_ID: ${VITE_AUTH_CLIENT_ID:-tradecopilot-client}
        VITE_AUTH_SCOPE: ${VITE_AUTH_SCOPE:-openid profile email}
    container_name: tradecopilot-client
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - public-proxy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health | grep ok"]
      interval: 30s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/TradeCopilot.Api/Dockerfile
    container_name: tradecopilot-api
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__TradeCopilot: Host=postgres;Port=5432;Database=${TRADECOPILOT_DB_NAME};Username=${TRADECOPILOT_DB_USER};Password=${TRADECOPILOT_DB_PASSWORD}
      Authentication__Authority: ${AUTH_AUTHORITY}
      Authentication__MetadataAddress: ${AUTH_METADATA_ADDRESS}
      Authentication__BackchannelAuthority: ${AUTH_BACKCHANNEL_AUTHORITY}
      Authentication__Audience: ${AUTH_AUDIENCE:-tradecopilot-api}
      Authentication__RequireHttpsMetadata: ${AUTH_REQUIRE_HTTPS_METADATA:-false}
    networks:
      - tradecopilot-internal
      - public-proxy
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 30s

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: tradecopilot-keycloak
    restart: unless-stopped
    command:
      - start
      - --http-enabled=true
      - --http-port=8080
      - --http-relative-path=/auth
      - --hostname=${KEYCLOAK_HOSTNAME}
      - --hostname-strict=true
      - --proxy-headers=xforwarded
      - --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/${KEYCLOAK_DB_NAME}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - ./infra/keycloak/tradecopilot-realm.json:/opt/keycloak/data/import/tradecopilot-realm.json:ro
      - ./infra/keycloak/themes:/opt/keycloak/themes:ro
    expose:
      - "8080"
    networks:
      - tradecopilot-internal
      - public-proxy
    depends_on:
      keycloak-postgres:
        condition: service_healthy

  keycloak-postgres:
    image: postgres:16-alpine
    container_name: tradecopilot-keycloak-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB_NAME}
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - keycloak-postgres-data:/var/lib/postgresql/data
    networks:
      - tradecopilot-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER} -d ${KEYCLOAK_DB_NAME}"]
      interval: 30s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: tradecopilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${TRADECOPILOT_DB_NAME}
      POSTGRES_USER: ${TRADECOPILOT_DB_USER}
      POSTGRES_PASSWORD: ${TRADECOPILOT_DB_PASSWORD}
    volumes:
      - tradecopilot-postgres-data:/var/lib/postgresql/data
    networks:
      - tradecopilot-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TRADECOPILOT_DB_USER} -d ${TRADECOPILOT_DB_NAME}"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  tradecopilot-postgres-data:
  keycloak-postgres-data:

networks:
  tradecopilot-internal:
    name: tradecopilot-internal
  public-proxy:
    external: true
